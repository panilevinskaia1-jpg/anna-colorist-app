<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0,
                 maximum-scale=1.0, user-scalable=no">
  <meta name="format-detection" content="telephone=no">
  <title>Панель мастера</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/admin.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

  <!-- Шапка -->
  <header class="admin-header">
    <span class="admin-header__title">Панель мастера</span>
  </header>

  <!-- Таб-бар -->
  <nav class="admin-tabs" id="admin-tabs">
    <button class="admin-tab active" data-tab="bookings">Записи</button>
    <button class="admin-tab"        data-tab="services">Услуги</button>
    <button class="admin-tab"        data-tab="add">+ Добавить</button>
  </nav>

  <!-- Контент -->
  <main class="admin-main" id="admin-main">
    <div class="admin-panel active" id="panel-bookings">
      <!-- Фильтр статусов -->
      <div class="admin-filter" id="bookings-filter">
        <button class="filter-btn active" data-status="upcoming">Предстоящие</button>
        <button class="filter-btn"        data-status="pending">Ожидают</button>
        <button class="filter-btn"        data-status="completed">Завершены</button>
        <button class="filter-btn"        data-status="cancelled">Отменены</button>
      </div>
      <div id="bookings-list" class="admin-list"></div>
    </div>

    <div class="admin-panel" id="panel-services">
      <div id="services-list" class="admin-list"></div>
    </div>

    <div class="admin-panel" id="panel-add">
      <form id="add-service-form" class="admin-form" novalidate>

        <div class="form-group">
          <label>ID услуги <span class="required">*</span></label>
          <input type="text" name="id" placeholder="например: balayage_2" required>
          <small>Латиница, без пробелов, уникальный</small>
        </div>

        <div class="form-group">
          <label>Категория <span class="required">*</span></label>
          <select name="category" required>
            <option value="">— выберите —</option>
            <option value="coloring">Окрашивание</option>
            <option value="care">Уход</option>
            <option value="cut">Стрижка</option>
          </select>
        </div>

        <div class="form-group">
          <label>Название <span class="required">*</span></label>
          <input type="text" name="title" placeholder="Балаяж" required>
        </div>

        <div class="form-group">
          <label>Краткое описание</label>
          <input type="text" name="subtitle" placeholder="Для карточки услуги">
        </div>

        <div class="form-group">
          <label>Полное описание</label>
          <textarea name="description" rows="3" placeholder="Для страницы услуги"></textarea>
        </div>

        <div class="form-group">
          <label>Длительность</label>
          <input type="text" name="duration" placeholder="2–3 часа">
        </div>

        <div class="form-group">
          <label>Политика отмены</label>
          <input type="text" name="cancelPolicy" value="Бесплатная отмена за 24 часа">
        </div>

        <div class="form-section-title">Цены по длине волос (₽)</div>
        <div class="form-prices">
          <div class="form-group">
            <label>Короткие</label>
            <input type="number" name="price_short" min="0" step="100" placeholder="0">
          </div>
          <div class="form-group">
            <label>Средние</label>
            <input type="number" name="price_medium" min="0" step="100" placeholder="0">
          </div>
          <div class="form-group">
            <label>Длинные</label>
            <input type="number" name="price_long" min="0" step="100" placeholder="0">
          </div>
          <div class="form-group">
            <label>Очень длинные</label>
            <input type="number" name="price_verylong" min="0" step="100" placeholder="0">
          </div>
        </div>

        <div id="add-service-error" class="form-error hidden"></div>
        <button type="submit" class="admin-btn admin-btn--primary">Создать услугу</button>
      </form>
    </div>
  </main>

  <!-- Модальное окно редактирования цен -->
  <div id="edit-price-modal" class="modal hidden">
    <div class="modal__backdrop" id="modal-backdrop"></div>
    <div class="modal__box">
      <div class="modal__title">Изменить цены</div>
      <div id="modal-content"></div>
      <div class="modal__actions">
        <button class="admin-btn admin-btn--ghost" id="modal-cancel">Отмена</button>
        <button class="admin-btn admin-btn--primary" id="modal-save">Сохранить</button>
      </div>
    </div>
  </div>

  <script src="js/telegram.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
